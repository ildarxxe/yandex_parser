services:
  app:
    image: reviewhub-app
    build:
      context: .
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f vendor/autoload.php && php-fpm -t"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    image: reviewhub-app
    environment:
      APP_SKIP_INIT: "true"
    command: >-
      sh -c "until [ -f vendor/autoload.php ] && php artisan migrate:status >/dev/null 2>&1;
      do sleep 2; done;
      exec php artisan queue:work database --queue=sync --sleep=2 --tries=1 --timeout=600"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s

  nginx:
    image: nginx:1.28-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    healthcheck:
      test: ["CMD-SHELL", "test -f public/hot && wget -q -O /dev/null http://127.0.0.1:5173/resources/js/app.js"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: imtera
      POSTGRES_USER: imtera
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imtera -d imtera"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  postgres_data:
  vendor:
